service: x-career-search
app: x-career-search

frameworkVersion: "3"

package:
  individually: true

provider:
  name: aws
  runtime: python3.9
  region: ${env:THE_REGION} # ${opt:region, "ap-northeast-1"}
  stage: ${env:STAGE, "dev"} # ${opt:stage, "dev"}
  timeout: 30
  # Search runs in isolated subnets and reaches Elasticsearch over the VPC
  # private network. Infrastructure IDs are injected by GitHub Actions secrets.
  vpc:
    securityGroupIds:
    - ${env:SEARCH_LAMBDA_SECURITY_GROUP_ID}
    subnetIds:
    - ${env:SEARCH_LAMBDA_SUBNET_A_ID}
    - ${env:SEARCH_LAMBDA_SUBNET_C_ID}
  iam:
    role:
      statements:
      - Effect: Allow
        Action:
        - ec2:CreateNetworkInterface
        - ec2:DescribeNetworkInterfaces
        - ec2:DescribeSubnets
        - ec2:DeleteNetworkInterface
        - ec2:AssignPrivateIpAddresses
        - ec2:UnassignPrivateIpAddresses
        Resource: "*"
      - Effect: Allow
        Action:
        - logs:CreateLogGroup
        - logs:TagResource
        Resource:
        - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app
      - Effect: Allow
        Action:
        - logs:CreateLogStream
        - logs:PutLogEvents
        Resource:
        - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app:*
      - Effect: Allow
        Action:
        - sqs:ReceiveMessage
        - sqs:DeleteMessage
        - sqs:GetQueueAttributes
        - sqs:ChangeMessageVisibility
        Resource:
        - ${env:SQS_QUEUE_ARN}

custom:
  pythonRequirements:
    dockerizePip: true
    layer:
      name: x-career-search
      description: XChange Career - Search
      compatibleRuntimes:
      - python3.9

functions:
  app:
    package:
      patterns:
      - "!requirements.txt"
      - "!package.json"
      - "!package-lock.json"
      - "!.serverless/**"
      - "!.github/**"
      - "!.idea/**"
      - "!.vscode/**"
      - "!venv/**"
      - "!**/**.sh"
      - "!node_modules/**"
      - "!integration/**"
      - "!test/**"
      - "!__pycache__/**"
      - "!**/__pycache__/**"

    handler: main.handler
    timeout: 60
    environment:
      STAGE: ${self:provider.stage}
      PROFILE_INDEX_NAME: ${env:PROFILE_INDEX_NAME}
    layers:
    - { Ref: PythonRequirementsLambdaLayer }
    events:
    - http:
        method: any
        path: /{proxy+}
        cors:
          origin: '*'
          headers: '*'
          allowCredentials: false
    - sqs:
        arn: ${env:SQS_QUEUE_ARN}
        batchSize: 10
        functionResponseType: ReportBatchItemFailures
plugins:
  - serverless-python-requirements
