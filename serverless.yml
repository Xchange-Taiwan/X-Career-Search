service: x-career-search
frameworkVersion: "3"
provider:
  name: aws
  runtime: python3.9
  region: ${env:THE_REGION} # ${opt:region, "ap-northeast-1"}
  stage: ${env:STAGE, "dev"} # ${opt:stage, "dev"}
  timeout: 30
  iam:
    role:
      statements:
      - Effect: Allow
        Action:
          - logs:CreateLogGroup
          - logs:TagResource
        Resource:
          - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app
      - Effect: Allow
        Action:
          - logs:CreateLogStream
          - logs:PutLogEvents
        Resource:
          - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app:*
      - Effect: "Allow"
        Action:
          - "es:ESHttpGet"
          - "es:ESHttpPut"
          - "es:ESHttpPost"
          - "es:ESHttpDelete"
        Resource:
          - !GetAtt OpenSearchDomain.Arn
  # - !Sub "arn:aws:es:${self:provider.region}:${aws:accountId}:domain/${self:provider.stage}-opensearch-domain/*"

custom:
  app: x-career-search
  pythonRequirements:
    dockerizePip: true
    layer:
      name: ${self:custom.app}
      description: XChange Career - search
      compatibleRuntimes:
        - python3.9

functions:
  app:
    package:
      individually: true
      patterns:
        - "!requirements.txt"
        - "!package.json"
        - "!package-lock.json"
        - "!.serverless/**"
        - "!.vscode/**"
        - "!venv/**"
        - "!**/**.sh"
        - "!node_modules/**"
        - "!integration/**"
        - "!test/**"
        - "!__pycache__/**"
        - "!**/__pycache__/**"
    handler: main.handler
    environment:
      STAGE: ${self:provider.stage}
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - http:
          method: any
          path: /{proxy+}
plugins:
  - serverless-python-requirements
