service: x-career-search
app: x-career-search

frameworkVersion: "3"

package:
  individually: true

provider:
  name: aws
  runtime: python3.9
  region: ${env:THE_REGION} # ${opt:region, "ap-northeast-1"}
  stage: ${env:STAGE, "dev"} # ${opt:stage, "dev"}
  timeout: 30
  iam:
    role:
      statements:
      - Effect: Allow
        Action:
        - logs:CreateLogGroup
        - logs:TagResource
        Resource:
        - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app
      - Effect: Allow
        Action:
        - logs:CreateLogStream
        - logs:PutLogEvents
        Resource:
        - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app:*
      # - Effect: "Allow"
      #   Action:
      #   - "es:ESHttpGet"
      #   - "es:ESHttpPut"
      #   - "es:ESHttpPost"
      #   - "es:ESHttpDelete"
      #   Resource:
      #   - arn:aws:es:${env:THE_REGION}:${env:ACCOUNT_ID}:domain/*

custom:
  pythonRequirements:
    dockerizePip: true
    layer:
      name: x-career-search
      description: XChange Career - Search
      compatibleRuntimes:
      - python3.9

functions:
  app:
    package:
      patterns:
      - "!requirements.txt"
      - "!package.json"
      - "!package-lock.json"
      - "!.serverless/**"
      - "!.github/**"
      - "!.idea/**"
      - "!.vscode/**"
      - "!venv/**"
      - "!**/**.sh"
      - "!node_modules/**"
      - "!integration/**"
      - "!test/**"
      - "!__pycache__/**"
      - "!**/__pycache__/**"

    handler: main.handler
    timeout: 30
    environment:
      STAGE: ${self:provider.stage}
    layers:
    - { Ref: PythonRequirementsLambdaLayer }
    events:
    - http:
        method: any
        path: /{proxy+}
        cors:
          origin: '*'
          headers: '*'
          allowCredentials: false
plugins:
  - serverless-python-requirements
