service: x-career-search
app: x-career-search

frameworkVersion: "3"

package:
  individually: true

provider:
  name: aws
  runtime: python3.9
  region: ${env:THE_REGION} # ${opt:region, "ap-northeast-1"}
  stage: ${env:STAGE, "dev"} # ${opt:stage, "dev"}
  timeout: 30
  iam:
    role:
      statements:
      - Effect: Allow
        Action:
        - logs:CreateLogGroup
        - logs:TagResource
        Resource:
        - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app
      - Effect: Allow
        Action:
        - logs:CreateLogStream
        - logs:PutLogEvents
        Resource:
        - arn:aws:logs:${env:THE_REGION}:${env:ACCOUNT_ID}:log-group:/aws/lambda/${self:service}-${self:provider.stage}-app:*
      # SQS event source mapping 需要的權限
      - Effect: Allow
        Action:
        - sqs:ReceiveMessage
        - sqs:DeleteMessage
        - sqs:GetQueueAttributes
        - sqs:ChangeMessageVisibility
        Resource:
        - arn:aws:sqs:${env:THE_REGION}:${env:ACCOUNT_ID}:X_CAREER_USER_DUPLICATE_QUEUE.fifo
        - arn:aws:sqs:${env:THE_REGION}:${env:ACCOUNT_ID}:X_CAREER_USER_DUPLICATE_DLQ.fifo

custom:
  pythonRequirements:
    dockerizePip: true
    layer:
      name: x-career-search
      description: XChange Career - Search
      compatibleRuntimes:
      - python3.9

functions:
  app:
    package:
      patterns:
      - "!requirements.txt"
      - "!package.json"
      - "!package-lock.json"
      - "!.serverless/**"
      - "!.github/**"
      - "!.idea/**"
      - "!.vscode/**"
      - "!venv/**"
      - "!**/**.sh"
      - "!node_modules/**"
      - "!integration/**"
      - "!test/**"
      - "!__pycache__/**"
      - "!**/__pycache__/**"

    handler: main.handler
    timeout: 30
    environment:
      STAGE: ${self:provider.stage}
    layers:
    - { Ref: PythonRequirementsLambdaLayer }
    events:
    - http:
        method: any
        path: /{proxy+}
        cors:
          origin: '*'
          headers: '*'
          allowCredentials: false
    # SQS event source mapping：同一個 Lambda 兼任 SQS consumer
    # batchItemFailures 讓失敗的訊息自動重試 / 進 DLQ，不影響同 batch 其他成功訊息
    # FIFO queue：不可設定 maximumBatchingWindow（Lambda API 會回 400）
    - sqs:
        arn: arn:aws:sqs:${env:THE_REGION}:${env:ACCOUNT_ID}:X_CAREER_USER_DUPLICATE_QUEUE.fifo
        batchSize: 10
        functionResponseType: ReportBatchItemFailures

plugins:
  - serverless-python-requirements
